<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant Chantier</title>
<link rel="icon" type="image/png" href="https://ibb.co/mCNfhjVw">

<link rel="apple-touch-icon" href="https://ibb.co/mCNfhjVw">

<meta name="theme-color" content="#d4900a">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #eef0f4;
  --border: #d0d4e0;
  --accent: #d4900a;
  --text: #1a1d2e;
  --muted: #7a80a0;
  --green: #2a9e60;
  --red: #cc4a1a;
  --blue: #2a7edc;
}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #syncBar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    height: 3px; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s;
  }
  #syncBar.active { transform: scaleX(1); }
  #syncStatus {
    position: fixed; bottom: 16px; right: 16px;
    font-family: 'IBM Plex Mono', monospace; font-size: .72rem;
    padding: 6px 12px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); z-index: 500;
    transition: opacity .3s;
  }
  #syncStatus.ok { color: var(--green); border-color: var(--green); }
  #syncStatus.err { color: var(--red); border-color: var(--red); }

  #loadingScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 900;
  }
  #loadingScreen h2 { font-size: 1.1rem; color: var(--accent); }
  #loadingScreen p { font-size: .82rem; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  header {
    background: var(--surface); border-bottom: 2px solid var(--accent);
    padding: 18px 28px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: .04em; color: var(--accent); text-transform: uppercase; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--muted); }

  .app { display: flex; height: calc(100vh - 57px); }

  .sidebar {
    width: 280px; min-width: 220px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-top { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); }
  .btn-new {
    width: 100%; padding: 12px; background: var(--accent); color: #0f1117;
    border: none; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: .9rem; cursor: pointer; letter-spacing: .03em;
    transition: opacity .15s; margin-bottom: 8px;
  }
  .btn-new:hover { opacity: .85; }
  .btn-templates {
    width: 100%; padding: 10px; background: none; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: .8rem; cursor: pointer; letter-spacing: .03em;
    transition: color .15s, border-color .15s;
  }
  .btn-templates:hover { color: var(--text); border-color: var(--text); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }

  .fiche-item {
    padding: 12px 14px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
    border: 1px solid transparent; transition: background .15s, border-color .15s;
  }
  .fiche-item:hover { background: var(--surface2); }
  .fiche-item.active { background: var(--surface2); border-color: var(--accent); }
  .fiche-item .fi-type { font-weight: 700; font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fiche-item .fi-date { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; color: var(--muted); margin-top: 3px; }
  .fiche-item .fi-status {
    display: inline-block; margin-top: 5px; font-size: .68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px;
    border-radius: 20px; background: var(--border); color: var(--muted);
  }
  .fiche-item .fi-status.en-cours { background: #1e3a28; color: var(--green); }
  .fiche-item .fi-status.termine { background: #2a1e10; color: var(--accent); }

  .main { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: var(--muted); text-align: center;
  }
  .empty-state .icon { font-size: 3rem; }
  .empty-state h2 { font-size: 1.2rem; color: var(--text); }
  .empty-state p { font-size: .88rem; max-width: 280px; }

  .fiche-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .fiche-title-block { flex: 1; }
  .label-field { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
  .fiche-type-input {
    font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
    background: none; border: none; border-bottom: 2px solid var(--border);
    color: var(--text); width: 100%; padding: 4px 0; outline: none; transition: border-color .2s;
  }
  .fiche-type-input:focus { border-bottom-color: var(--accent); }
  .fiche-type-input::placeholder { color: var(--muted); }
  .fiche-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-input {
    font-family: 'IBM Plex Mono', monospace; font-size: .8rem; background: var(--surface);
    border: 1px solid var(--border); color: var(--text); border-radius: 6px;
    padding: 7px 10px; outline: none; transition: border-color .2s;
  }
  .meta-input:focus { border-color: var(--accent); }
  .status-select { appearance: none; cursor: pointer; }
  .btn-delete {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: .8rem;
    font-family: 'Syne', sans-serif; transition: border-color .15s, color .15s;
  }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 20px; }
  .section.process-section { border-color: #2a3a52; }
  .section-title {
    font-size: .8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .1em; color: var(--accent); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title.process-title { color: var(--blue); }
  .section-title .badge { font-size: .65rem; background: var(--border); color: var(--muted); border-radius: 20px; padding: 2px 8px; }

  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px; background: var(--surface2);
    border-radius: 8px; padding: 10px 12px; border: 1px solid transparent; transition: border-color .15s;
  }
  .check-item:hover { border-color: var(--border); }
  .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .check-item input[type="checkbox"].process-chk { accent-color: var(--blue); }
  .check-item label { flex: 1; font-size: .88rem; cursor: pointer; transition: color .15s; }
  .check-item input[type="checkbox"]:checked + label { text-decoration: line-through; color: var(--muted); }
  .check-item .btn-remove-item {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; padding: 0 4px; line-height: 1; transition: color .15s;
    opacity: 0; flex-shrink: 0;
  }
  .check-item:hover .btn-remove-item { opacity: 1; }
  .check-item .btn-remove-item:hover { color: var(--red); }

  .add-item-row { 
    display: flex; 
    gap: 8px; 
    margin-top: 8px; 
    flex-wrap: wrap; /* Permet de revenir à la ligne si pas de place */
  }

  /* Sur petit téléphone, on met le bouton à 100% de large */
  @media (max-width: 480px) {
    .add-item-row select, .add-item-row button {
      width: 100% !important;
      flex: none !important;
    }
  }
  .add-item-input {
    flex: 1; background: var(--surface2); border: 1px dashed var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px;
    font-family: 'Syne', sans-serif; font-size: .85rem; outline: none; transition: border-color .2s;
  }
  .add-item-input:focus { border-color: var(--accent); border-style: solid; }
  .add-item-input::placeholder { color: var(--muted); }
  .btn-add {
    background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
    border-radius: 8px; padding: 9px 16px; font-family: 'Syne', sans-serif;
    font-weight: 700; cursor: pointer; transition: background .15s;
  }
  .btn-add:hover { background: var(--border); }
  .btn-add.process-btn { color: var(--blue); }

  .notes-area {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 12px 14px;
    font-family: 'IBM Plex Mono', monospace; font-size: .82rem; line-height: 1.65;
    resize: vertical; min-height: 100px; outline: none; transition: border-color .2s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }

  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .calc-grid { grid-template-columns: 1fr; } }
  .calc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .calc-card label { display: block; font-size: .7rem; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
  .calc-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .calc-input {
    width: 80px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: .85rem; outline: none; transition: border-color .2s;
  }
  .calc-input:focus { border-color: var(--accent); }
  .calc-op { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: .9rem; }
  .calc-result {
    font-family: 'IBM Plex Mono', monospace; font-size: .95rem; font-weight: 500;
    color: var(--accent); padding: 7px 12px; background: var(--surface);
    border-radius: 6px; border: 1px solid var(--border); min-width: 80px; text-align: right;
  }
  .calc-unit { font-size: .75rem; color: var(--muted); }
  .calc-hint { margin-top: 8px; font-size: .72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .save-bar { display: flex; justify-content: flex-end; margin-top: 8px; }
  .btn-save {
    background: var(--green); color: #0f1117; border: none; border-radius: 8px;
    padding: 11px 28px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem;
    cursor: pointer; letter-spacing: .03em; transition: opacity .15s;
  }
  .btn-save:hover { opacity: .85; }
  .save-msg { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--green); align-self: center; margin-right: 12px; opacity: 0; transition: opacity .3s; }
  .save-msg.visible { opacity: 1; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn .15s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 14px; padding: 28px 28px 24px; width: 440px; max-width: 95vw; animation: slideUp .18s; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; color: var(--accent); }
  .modal p { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; outline: none; margin-bottom: 20px; transition: border-color .2s; }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 10px 20px; font-family: 'Syne', sans-serif; cursor: pointer; font-size: .875rem; }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-confirm { background: var(--accent); color: #0f1117; border: none; border-radius: 8px; padding: 10px 22px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: .875rem; transition: opacity .15s; }
  .btn-confirm:hover { opacity: .85; }

  /* PAGE MODÈLES */
  .tpl-page-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  .tpl-page-section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer; user-select: none; transition: background .15s;
  }
  .tpl-page-section-header:hover { background: var(--surface2); }
  .tpl-page-section-header.open { border-bottom: 1px solid var(--border); }
  .tpl-page-section-title { font-size: .9rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); }
  .tpl-page-section-title.process { color: var(--blue); }
  .tpl-page-section-body { padding: 16px 20px; }

  .tpl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .tpl-header h2 { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
  .tpl-grid { display: flex; flex-direction: column; gap: 14px; }
  .tpl-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tpl-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; transition: background .15s; }
  .tpl-card-header:hover { background: var(--border); }
  .tpl-card-name input { background: none; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; outline: none; padding: 2px 4px; width: 220px; }
  .tpl-card-name input:focus { border-bottom-color: var(--accent); }
  .tpl-card-actions { display: flex; gap: 8px; align-items: center; }
  .tpl-chevron { color: var(--muted); font-size: .8rem; transition: transform .2s; }
  .tpl-chevron.open { transform: rotate(180deg); }
  .tpl-card-body { padding: 0 18px 16px; border-top: 1px solid var(--border); }
  .tpl-items { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .tpl-item { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 7px; padding: 8px 10px; }
  .tpl-item-drag { color: var(--muted); cursor: grab; font-size: 1rem; flex-shrink: 0; }
  .tpl-item input[type="text"] { flex: 1; background: none; border: none; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: .83rem; outline: none; border-bottom: 1px solid transparent; transition: border-color .2s; padding: 1px 2px; }
  .tpl-item input[type="text"]:focus { border-bottom-color: var(--accent); }
  .tpl-item .btn-remove-item { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 4px; line-height: 1; transition: color .15s; flex-shrink: 0; }
  .tpl-item .btn-remove-item:hover { color: var(--red); }
  .tpl-add-row { display: flex; gap: 8px; margin-top: 10px; }
  .tpl-add-input { flex: 1; background: var(--surface); border: 1px dashed var(--border); color: var(--text); border-radius: 7px; padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: .82rem; outline: none; transition: border-color .2s; }
  .tpl-add-input:focus { border-color: var(--accent); border-style: solid; }
  .tpl-add-input::placeholder { color: var(--muted); }
  .btn-tpl-delete { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 6px 12px; font-family: 'Syne', sans-serif; font-size: .75rem; cursor: pointer; transition: border-color .15s, color .15s; }
  .btn-tpl-delete:hover { border-color: var(--red); color: var(--red); }
  .btn-new-tpl { background: var(--surface2); border: 1px dashed var(--border); color: var(--muted); border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif; font-size: .88rem; font-weight: 600; cursor: pointer; width: 100%; transition: border-color .15s, color .15s; margin-top: 6px; }
  .btn-new-tpl:hover { border-color: var(--accent); color: var(--accent); }
  .btn-new-tpl.process:hover { border-color: var(--blue); color: var(--blue); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* --- ADAPTATION MOBILE ET TABLETTE --- */
@media (max-width: 800px) {
  .app { 
    flex-direction: column; 
    height: auto; 
  }
  
  .sidebar { 
    width: 100% !important; 
    height: auto !important; 
    max-height: 300px; 
    border-right: none;
    border-bottom: 2px solid var(--accent);
    display: block !important; 
  }

  #mainContent { 
    width: 100% !important; 
    display: block !important; 
    padding: 15px !important; 
  }

  body.show-detail .sidebar { 
    display: none !important; 
  }

  /* FORCE L'AFFICHAGE DES CROIX SUR MOBILE ICI */
  .check-item .btn-remove-item, 
  .tpl-item .btn-remove-item {
    opacity: 1 !important;
    visibility: visible !important;
    display: block !important;
  }
}

/* 1. Bouton flottant Nouvelle fiche sur mobile */
@media (max-width: 600px) {
  .btn-new {
    position: fixed;
    bottom: 70px;
    right: 20px;
    width: auto;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 999;
  }
}

  /* 2. Forcer l'affichage des boutons supprimer (croix) */
  /* On cible l'élément même s'il est à côté d'une checkbox cochée */
  .check-item .btn-remove-item, 
  .tpl-item .btn-remove-item,
  .check-item input[type="checkbox"]:checked ~ .btn-remove-item {
    opacity: 1 !important;
    visibility: visible !important;
    display: block !important;
  }

  /* 3. Taille spéciale pour le tactile */
  @media (max-width: 800px) {
    .btn-remove-item {
      padding: 8px 12px !important;
      font-size: 1.4rem !important;
      color: var(--red) !important;
      min-width: 40px;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div id="syncBar"></div>
<div id="syncStatus">⟳ Chargement...</div>

<div id="loadingScreen">
  <div class="spinner"></div>
  <h2>Assistant Chantier</h2>
  <p>Connexion à Google Drive...</p>
</div>

<header>
  <h1>⚒ Assistant Chantier</h1>
  <span id="clock"></span>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="openNewModal()">+ Nouvelle fiche</button>
      <button class="btn-templates" onclick="openTemplatesPage()">⚙ Gérer les modèles</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="icon">🗂</div>
      <h2>Aucune fiche ouverte</h2>
      <p>Créez une nouvelle fiche de client/chantier pour démarrer.</p>
    </div>
  </main>
</div>

<!-- Modal nouvelle fiche -->
<div class="modal-overlay" id="newModal" style="display:none;">
  <div class="modal">
    <h2>Nouvelle fiche</h2>
    <p>Ecrivez le nom du client, puis choisissez un modèle de checklist.</p>
    <input type="text" id="newTypeInput" placeholder="Nom client/chantier" maxlength="80"
      onkeydown="if(event.key==='Enter') confirmNew()">
    <div class="label-field" style="margin-bottom:8px;">Modèle de checklist</div>
    <select class="meta-input" id="newTemplateSelect" style="width:100%;margin-bottom:20px;">
      <option value="">— Liste vide —</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmNew()">Créer</button>
    </div>
  </div>
</div>

<!-- Modal confirmation -->
<div class="modal-overlay" id="confirmModal" style="display:none;">
  <div class="modal">
    <h2 id="confirmTitle">Confirmer</h2>
    <p id="confirmMsg"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
      <button class="btn-confirm" id="confirmOk" style="background:var(--red);">Supprimer</button>
    </div>
  </div>
</div>

<script>
// À mettre au début de ta balise <script> dans index.html sur GitHub
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_usgl4KcS4_XyN7HpWOOqrCVoXA5nmJMafYWbOAURw-1kFrqQRwb9HOXf2sWNE6SE/exec"; 

function save() {
  const data = JSON.stringify(DB);
  // Au lieu de google.script.run, on envoie les données par "fetch"
  fetch(SCRIPT_URL, {
  method: 'POST',
  mode: 'no-cors',
  redirect: 'follow',
  body: JSON.stringify({ action: 'save', data: { fiches, templates, processModels } })
})

function loadFromServer() {
  setSyncBar(true);
  showSync('⟳ Chargement...');
  
  // On remplace google.script.run par un appel "fetch" vers ton URL
  fetch(SCRIPT_URL + "?action=getData", {
  method: 'GET',
  redirect: 'follow'
})
    .then(response => response.json())
    .then(data => {
      fiches = data.fiches || [];
      templates = data.templates || [];
      processModels = data.processModels || [];
      setSyncBar(false);
      showSync('✓ Données chargées', 'ok');
      document.getElementById('loadingScreen').style.display = 'none';
      renderSidebar();
      retourAListe();
    })
    .catch(error => {
  console.error(error);
  showSync('✗ Erreur de connexion', 'err');
  document.getElementById('loadingScreen').style.display = 'none'; // ← ajouter
});
}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let fiches = [];
let templates = [];
let processModels = [];
let currentId = null;
let saveTimer = null;

// ══════════════════════════════════════════════════
//  SYNC
// ══════════════════════════════════════════════════
function showSync(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = type || '';
  el.style.opacity = '1';
  if (type === 'ok') setTimeout(() => { el.style.opacity = '0'; }, 2500);
}
function setSyncBar(active) {
  document.getElementById('syncBar').classList.toggle('active', active);
}

function save() {
  clearTimeout(saveTimer);
  showSync('⟳ Sauvegarde...');
  
  saveTimer = setTimeout(() => {
    setSyncBar(true);
    const data = { fiches, templates, processModels };

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
      setSyncBar(false);
      if(res.ok) showSync('✓ Synchronisé', 'ok');
    })
    .catch(err => {
      setSyncBar(false);
      showSync('✗ Erreur de sauvegarde', 'err');
    });
  }, 800);
}

// ══════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'}) +
    ' — ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════════════════
//  MODAL NOUVELLE FICHE
// ══════════════════════════════════════════════════
function openNewModal() {
  const sel = document.getElementById('newTemplateSelect');
  sel.innerHTML = '<option value="">— Liste vide —</option>' +
    templates.map((t, i) => `<option value="${i}">${escHtml(t.name)}</option>`).join('');
  document.getElementById('newModal').style.display = 'flex';
  setTimeout(() => document.getElementById('newTypeInput').focus(), 50);
}
function closeNewModal() {
  document.getElementById('newModal').style.display = 'none';
  document.getElementById('newTypeInput').value = '';
}
function confirmNew() {
  const type = document.getElementById('newTypeInput').value.trim();
  if (!type) return;
  const tplIdx = document.getElementById('newTemplateSelect').value;
  let checklist = [];
  if (tplIdx !== '') {
    const tpl = templates[parseInt(tplIdx)];
    if (tpl) checklist = tpl.items.map(text => ({ text, done: false }));
  }
  const fiche = {
    id: Date.now(),
    type,
    date: new Date().toLocaleDateString('fr-FR'),
    lieu: '',
    status: 'preparation',
    checklist,
    process: [],
    notes: '',
    retex: '',
    usedTemplates: tplIdx !== '' && templates[parseInt(tplIdx)] ? [templates[parseInt(tplIdx)].name] : [],
    usedProcessModels: [],
    calculs: { surface: { l: '', w: '' }, volume: { s: '', h: '' }, densite: '', custom: '' },
    sections: { checklist: true, process: true, calculs: true, notes: true, retex: true }
  };
  fiches.unshift(fiche);
  save();
  renderSidebar();
  openFiche(fiche.id);
  closeNewModal();
}

// ══════════════════════════════════════════════════
//  PAGE GÉRER LES MODÈLES
// ══════════════════════════════════════════════════
function openTemplatesPage() {
  currentId = null;
  renderSidebar();
  renderTemplatesPage();
  document.body.classList.add('show-detail');
}

function renderTemplatesPage() {
  document.getElementById('mainContent').innerHTML = `
    <div class="tpl-page">
      <div class="tpl-header">
        <h2>⚙ Gérer les modèles</h2>
        <button class="btn-cancel" onclick="backToFiches()" style="font-family:'Syne',sans-serif;">← Retour</button>
      </div>

      <!-- SECTION CHECKLISTS -->
      <div class="tpl-page-section">
        <div class="tpl-page-section-header open" id="tplSecHeaderChecklist" onclick="toggleTplPageSection('Checklist')">
          <span class="tpl-page-section-title">✅ Modèles de checklist</span>
          <span class="tpl-chevron open" id="tplSecChevChecklist">▼</span>
        </div>
        <div class="tpl-page-section-body" id="tplSecBodyChecklist">
          <div class="tpl-grid" id="tplGrid">
            ${templates.map((t, ti) => renderTemplateCard(t, ti, 'checklist')).join('')}
          </div>
          <button class="btn-new-tpl" onclick="createNewTemplate('checklist')">+ Nouveau modèle checklist</button>
        </div>
      </div>

      <!-- SECTION PROCESS -->
      <div class="tpl-page-section">
        <div class="tpl-page-section-header open" id="tplSecHeaderProcess" onclick="toggleTplPageSection('Process')">
          <span class="tpl-page-section-title process">📋 Modèles de process</span>
          <span class="tpl-chevron open" id="tplSecChevProcess">▼</span>
        </div>
        <div class="tpl-page-section-body" id="tplSecBodyProcess">
          <div class="tpl-grid" id="processGrid">
            ${processModels.map((t, ti) => renderTemplateCard(t, ti, 'process')).join('')}
          </div>
          <button class="btn-new-tpl process" onclick="createNewTemplate('process')">+ Nouveau modèle process</button>
        </div>
      </div>

    </div>
  `;
}

function toggleTplPageSection(cap) {
  const body = document.getElementById('tplSecBody' + cap);
  const chev = document.getElementById('tplSecChev' + cap);
  const header = document.getElementById('tplSecHeader' + cap);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
  header.classList.toggle('open', !open);
}

function renderTemplateCard(t, ti, type) {
  const prefix = type === 'process' ? 'proc' : 'tpl';
  return `
    <div class="tpl-card" id="${prefix}card-${ti}">
      <div class="tpl-card-header" onclick="toggleTplCard('${prefix}', ${ti})">
        <div class="tpl-card-name">
          <input type="text" value="${escHtml(t.name)}" placeholder="Nom du modèle..."
            onclick="event.stopPropagation()" oninput="updateTemplateName('${type}', ${ti}, this.value)">
        </div>
        <div class="tpl-card-actions">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);">${t.items.length} point${t.items.length > 1 ? 's' : ''}</span>
          <button class="btn-tpl-delete" onclick="event.stopPropagation();deleteTemplate('${type}', ${ti})">Supprimer</button>
          <span class="tpl-chevron" id="${prefix}chev-${ti}">▼</span>
        </div>
      </div>
      <div class="tpl-card-body" id="${prefix}body-${ti}" style="display:none;">
        <div class="tpl-items" id="${prefix}items-${ti}">
          ${t.items.map((item, ii) => renderTplItem(prefix, ti, ii, item, type)).join('')}
        </div>
        <div class="tpl-add-row">
          <input class="tpl-add-input" id="${prefix}add-${ti}" placeholder="Nouveau point..."
            onkeydown="if(event.key==='Enter') addTplItem('${type}', ${ti})">
          <button class="btn-add" onclick="addTplItem('${type}', ${ti})">+ Ajouter</button>
        </div>
      </div>
    </div>
  `;
}

function renderTplItem(prefix, ti, ii, text, type) {
  return `
    <div class="tpl-item" id="${prefix}item-${ti}-${ii}">
      <span class="tpl-item-drag">⠿</span>
      <input type="text" value="${escHtml(text)}" placeholder="Point..."
        oninput="updateTplItem('${type}', ${ti}, ${ii}, this.value)">
      <button class="btn-remove-item" onclick="removeTplItem('${type}', ${ti}, ${ii})" title="Supprimer">×</button>
    </div>
  `;
}

function toggleTplCard(prefix, ti) {
  const body = document.getElementById(`${prefix}body-${ti}`);
  const chev = document.getElementById(`${prefix}chev-${ti}`);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
}

function createNewTemplate(type) {
  if (type === 'process') processModels.push({ name: "Nouveau process", items: [] });
  else templates.push({ name: "Nouveau modèle", items: [] });
  save();
  renderTemplatesPage();
}

function deleteTemplate(type, ti) {
  const arr = type === 'process' ? processModels : templates;
  openConfirmModal(`Supprimer "${arr[ti].name}" ?`, 'Ce modèle sera supprimé définitivement.',
    () => { arr.splice(ti, 1); save(); renderTemplatesPage(); });
}

function updateTemplateName(type, ti, name) {
  if (type === 'process') processModels[ti].name = name;
  else templates[ti].name = name;
  save();
}

function addTplItem(type, ti) {
  const prefix = type === 'process' ? 'proc' : 'tpl';
  const arr = type === 'process' ? processModels : templates;
  const input = document.getElementById(`${prefix}add-${ti}`);
  const text = input.value.trim();
  if (!text) return;
  arr[ti].items.push(text);
  save();
  const cardEl = document.getElementById(`${prefix}card-${ti}`);
  const tmp = document.createElement('div');
  tmp.innerHTML = renderTemplateCard(arr[ti], ti, type);
  cardEl.replaceWith(tmp.firstElementChild);
  document.getElementById(`${prefix}body-${ti}`).style.display = 'block';
  document.getElementById(`${prefix}chev-${ti}`).classList.add('open');
  const newInput = document.getElementById(`${prefix}add-${ti}`);
  if (newInput) newInput.focus();
}

function removeTplItem(type, ti, ii) {
  const prefix = type === 'process' ? 'proc' : 'tpl';
  const arr = type === 'process' ? processModels : templates;
  arr[ti].items.splice(ii, 1);
  save();
  const body = document.getElementById(`${prefix}body-${ti}`);
  const wasOpen = body.style.display !== 'none';
  const tmp = document.createElement('div');
  tmp.innerHTML = renderTemplateCard(arr[ti], ti, type);
  document.getElementById(`${prefix}card-${ti}`).replaceWith(tmp.firstElementChild);
  if (wasOpen) {
    document.getElementById(`${prefix}body-${ti}`).style.display = 'block';
    document.getElementById(`${prefix}chev-${ti}`).classList.add('open');
  }
}

function updateTplItem(type, ti, ii, value) {
  if (type === 'process') processModels[ti].items[ii] = value;
  else templates[ti].items[ii] = value;
  save();
}

function backToFiches() {
  currentId = null;
  renderSidebar();
  document.body.classList.remove('show-detail');
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state"><div class="icon">🗂</div>
    <h2>Aucune fiche ouverte</h2>
    <p>Créez une nouvelle fiche de client/chantier pour démarrer.</p></div>`;
}

// ══════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (!fiches.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.78rem;padding:12px 8px;text-align:center;">Aucune fiche</p>';
    return;
  }
  const statusLabels = { preparation: 'Préparation', en_cours: 'En cours', termine: 'Terminé' };
  const statusClass = { preparation: '', en_cours: 'en-cours', termine: 'termine' };
  list.innerHTML = fiches.map(f => `
    <div class="fiche-item ${f.id === currentId ? 'active' : ''}" onclick="openFiche(${f.id})">
      <div class="fi-type">${escHtml(f.type)}</div>
      <div class="fi-date">${f.date}</div>
      <span class="fi-status ${statusClass[f.status]}">${statusLabels[f.status] || f.status}</span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════
//  FICHE
// ══════════════════════════════════════════════════
function openFiche(id) {
  currentId = id;
  const f = fiches.find(x => x.id === id);
  if (!f) return;

  // Compatibilité anciennes fiches
  if (!f.calculs) f.calculs = {};
  if (!f.calculs.surface) f.calculs.surface = { l: '', w: '' };
  if (!f.calculs.volume) f.calculs.volume = { s: '', h: '' };
  if (f.calculs.densite === undefined) f.calculs.densite = '';
  if (f.calculs.custom === undefined) f.calculs.custom = '';
  if (!f.usedTemplates) f.usedTemplates = [];
  if (!f.process) f.process = [];
  if (!f.usedProcessModels) f.usedProcessModels = [];
  if (!f.sections) f.sections = { checklist: true, process: true, calculs: true, notes: true, retex: true };
  selectModeActive = false; processSelectModeActive = false;

  document.body.classList.add('show-detail');
  renderSidebar();

  const statusOptions = ['preparation', 'en_cours', 'termine'];
  const statusLabels = { preparation: 'Préparation', en_cours: 'En cours', termine: 'Terminé' };

  const surfaceInit = calcSurface(f.calculs.surface.l, f.calculs.surface.w);
  const volumeInit  = calcVolume(f.calculs.volume.s, f.calculs.volume.h);
  const tonnageInit = calcTonnage(volumeInit, f.calculs.densite);
  const tonnesInit  = calcTonnes(volumeInit, f.calculs.densite);

  document.getElementById('mainContent').innerHTML = `
    <button class="btn-cancel" onclick="retourAListe()" style="margin-bottom:20px;width:100%;display:block;font-weight:bold;">
      ← Retour aux fiches
    </button>

    <div class="fiche-header">
      <div class="fiche-title-block">
        <div class="label-field">Client/chantier</div>
        <input class="fiche-type-input" value="${escHtml(f.type)}" placeholder="Client/chantier..." maxlength="80"
          oninput="updateField('type', this.value)">
        <div class="label-field" style="margin-top:10px;">Lieu</div>
        <input class="meta-input" value="${escHtml(f.lieu)}" placeholder="Adresse / site"
          style="width:100%;" oninput="updateField('lieu', this.value)">
      </div>
      <div class="fiche-meta">
        <div class="meta-field">
          <div class="label-field">Date</div>
          <input class="meta-input" value="${escHtml(f.date)}" placeholder="JJ/MM/AAAA" oninput="updateField('date', this.value)">
        </div>
        <div class="meta-field">
          <div class="label-field">Statut</div>
          <select class="meta-input status-select" onchange="updateField('status', this.value)">
            ${statusOptions.map(s => `<option value="${s}" ${f.status === s ? 'selected' : ''}>${statusLabels[s]}</option>`).join('')}
          </select>
        </div>
        <button class="btn-delete" onclick="deleteFiche(${f.id})">🗑 Supprimer</button>
      </div>
    </div>

    ${f.usedTemplates && f.usedTemplates.length ? `
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;padding:10px 14px;
      background:var(--surface);border:1px solid var(--border);border-radius:10px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted);align-self:center;">Tâches/Travaux :</span>
      ${f.usedTemplates.map((name, idx) => `
        <span style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;
          padding:3px 10px;border-radius:20px;background:#1e2a1a;color:var(--green);
          border:1px solid var(--green);display:inline-flex;align-items:center;gap:6px;">
          ⚙ ${escHtml(name)}
          <button onclick="removeUsedTemplate(${idx})" style="background:none;border:none;color:var(--green);
            cursor:pointer;font-size:1rem;line-height:1;padding:0;opacity:.7;" title="Retirer">×</button>
        </span>
      `).join('')}
    </div>` : ''}

    <!-- CHECKLIST -->
    <div class="section">
      <div class="section-title">
        ✅ Checklist
        <span class="badge" id="checkBadge">${f.checklist.filter(x=>x.done).length}/${f.checklist.length}</span>
        <button onclick="toggleSelectMode()" id="btnSelectMode" style="margin-left:auto;background:none;
          border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 10px;
          font-family:'Syne',sans-serif;font-size:.7rem;cursor:pointer;">
          ☐ Sélectionner
        </button>
        <button onclick="toggleSection('checklistBody', 'btnToggleChecklist')" id="btnToggleChecklist" style="background:none;
          border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;
          font-size:.7rem;cursor:pointer;transition:transform .2s;">▼</button>
      </div>
      <div id="checklistBody">
        <div id="selectBar" style="display:none;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">
          <button onclick="selectAllItems()" style="background:none;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;">
            ☑ Tout sélectionner
          </button>
          <button onclick="deselectAllItems()" style="background:none;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;">
            ☐ Tout désélectionner
          </button>
          <button onclick="deleteSelectedItems()" style="background:var(--red);border:none;color:#fff;
            border-radius:6px;padding:4px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer;">
            🗑 Supprimer la sélection
          </button>
          <span id="selectCount" style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);"></span>
        </div>
        ${templates.length ? `
        <div class="add-item-row" style="margin-bottom:12px;">
          <select class="add-item-input" id="importTplSelect" style="font-family:'IBM Plex Mono',monospace;font-size:.78rem;">
            <option value="">— Importer un modèle checklist —</option>
            ${templates.map((t, i) => `<option value="${i}">${escHtml(t.name)}</option>`).join('')}
          </select>
          <button class="btn-add" onclick="importTemplate()">+ Importer</button>
        </div>` : ''}
        <div class="checklist" id="checklist">
          ${f.checklist.map((item, i) => `
            <div class="check-item" id="ci-${i}">
              <input type="checkbox" id="chk-${i}" ${item.done ? 'checked' : ''}
                onchange="selectModeActive ? handleSelCheck(${i}, this) : toggleCheck(${i}, this.checked)">
              <label for="chk-${i}">${escHtml(item.text)}</label>
              <button class="btn-remove-item" onclick="removeCheck(${i})">×</button>
            </div>
          `).join('')}
        </div>
        <div class="add-item-row">
          <input class="add-item-input" id="newCheckInput" placeholder="Ajouter un point à vérifier..."
            onkeydown="if(event.key==='Enter') addCheck()">
          <button class="btn-add" onclick="addCheck()">+ Ajouter</button>
        </div>
      </div>
    </div>

    <!-- PROCESS -->
    <div class="section process-section">
      <div class="section-title process-title">
        📋 Process
        <span class="badge" id="processBadge">${f.process.filter(x=>x.done).length}/${f.process.length}</span>
        <button onclick="toggleProcessSelectMode()" id="btnProcessSelectMode" style="margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 10px;font-family:'Syne',sans-serif;font-size:.7rem;cursor:pointer;">☐ Sélectionner</button>
        <button onclick="toggleSection('processBody', 'btnToggleProcess')" id="btnToggleProcess" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:.7rem;cursor:pointer;transition:transform .2s;">▼</button>
      </div>
      <div id="processBody">
        <div id="processSelectBar" style="display:none;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">
          <button onclick="selectAllProcess()" style="background:none;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;">
            ☑ Tout sélectionner
          </button>
          <button onclick="deselectAllProcess()" style="background:none;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;">
            ☐ Tout désélectionner
          </button>
          <button onclick="deleteSelectedProcess()" style="background:var(--red);border:none;color:#fff;
            border-radius:6px;padding:4px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer;">
            🗑 Supprimer la sélection
          </button>
          <span id="processSelectCount" style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);"></span>
        </div>
        ${processModels.length ? `
        <div class="add-item-row" style="margin-bottom:12px;">
          <select class="add-item-input" id="importProcessSelect" style="font-family:'IBM Plex Mono',monospace;font-size:.78rem;">
            <option value="">— Importer un modèle process —</option>
            ${processModels.map((t, i) => `<option value="${i}">${escHtml(t.name)}</option>`).join('')}
          </select>
          <button class="btn-add process-btn" onclick="importProcessModel()">+ Importer</button>
        </div>` : ''}
        <div class="checklist" id="processList">
          ${f.process.map((item, i) => `
            <div class="check-item" id="pi-${i}">
              <input type="checkbox" class="process-chk" id="pchk-${i}" ${item.done ? 'checked' : ''}
                onchange="toggleProcess(${i}, this.checked)">
              <label for="pchk-${i}">${escHtml(item.text)}</label>
              <button class="btn-remove-item" onclick="removeProcess(${i})">×</button>
            </div>
          `).join('')}
        </div>
        <div class="add-item-row">
          <input class="add-item-input" id="newProcessInput" placeholder="Ajouter une étape de process..."
            onkeydown="if(event.key==='Enter') addProcess()">
          <button class="btn-add process-btn" onclick="addProcess()">+ Ajouter</button>
        </div>
      </div>
    </div>

    <!-- CALCULS -->
    <div class="section">
      <div class="section-title">📐 Calculs rapides
        <button onclick="toggleSection('calculsBody', 'btnCalculs')" id="btnCalculs" style="margin-left:auto;background:none;
          border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;
          font-size:.7rem;cursor:pointer;transition:transform .2s;">▼</button>
      </div>
      <div id="calculsBody">
        <div class="calc-grid">
          <div class="calc-card">
            <label>① Surface (L × l)</label>
            <div class="calc-row">
              <input class="calc-input" id="calc-l" type="number" step="0.1" value="${f.calculs.surface.l}" placeholder="L (m)" oninput="updateCalcSurface()">
              <span class="calc-op">×</span>
              <input class="calc-input" id="calc-w" type="number" step="0.1" value="${f.calculs.surface.w}" placeholder="l (m)" oninput="updateCalcSurface()">
              <span class="calc-op">=</span>
              <div class="calc-result" id="res-surface">${surfaceInit}</div>
              <span class="calc-unit">m²</span>
            </div>
          </div>
          <div class="calc-card">
            <label>② Volume (S × épaisseur)</label>
            <div class="calc-row">
              <input class="calc-input" id="calc-s" type="number" step="0.01" value="${f.calculs.volume.s}" placeholder="S (m²)" oninput="updateCalcVolume()">
              <span class="calc-op">×</span>
              <input class="calc-input" id="calc-h" type="number" step="0.001" value="${f.calculs.volume.h}" placeholder="e (m)" oninput="updateCalcVolume()">
              <span class="calc-op">=</span>
              <div class="calc-result" id="res-volume">${volumeInit}</div>
              <span class="calc-unit">m³</span>
            </div>
          </div>
          <div class="calc-card" style="grid-column: 1 / -1;">
            <label>③ Tonnage (Volume × densité)</label>
            <div class="calc-row">
              <input class="calc-input" id="calc-vol-t" type="number" step="0.001" value="${volumeInit !== '—' ? volumeInit : ''}" placeholder="Vol (m³)" oninput="updateCalcTonnage()">
              <span class="calc-op">×</span>
              <input class="calc-input" id="calc-densite" type="number" step="1" value="${escHtml(f.calculs.densite)}" placeholder="kg/m³" oninput="updateCalcTonnage()">
              <span class="calc-op">=</span>
              <div class="calc-result" id="res-tonnage">${tonnageInit}</div>
              <span class="calc-unit">kg</span>
              <div class="calc-result" style="margin-left:4px;" id="res-tonnes">${tonnesInit}</div>
              <span class="calc-unit">T</span>
            </div>
            <div class="calc-hint">Densités courantes — Enrobé : 2400 · Béton : 2300 · Grave : 1900 · Terre : 1600 · Sable : 1700</div>
          </div>
        </div>
        <div style="margin-top:12px;">
          <div class="label-field" style="margin-bottom:6px;">Notes de calculs / besoins matériaux</div>
          <textarea class="notes-area" style="min-height:70px;" placeholder="Ex : 12 m² × 0,08 m = 0,96 m³ → 2 T enrobé..."
            oninput="updateCalcCustom(this.value)">${escHtml(f.calculs.custom)}</textarea>
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="section">
      <div class="section-title">📝 Notes de chantier
        <button onclick="toggleSection('notesBody', 'btnNotes')" id="btnNotes" style="margin-left:auto;background:none;
          border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;
          font-size:.7rem;cursor:pointer;transition:transform .2s;">▼</button>
      </div>
      <div id="notesBody">
        <textarea class="notes-area" placeholder="Observations, difficultés, points de vigilance..."
          oninput="updateField('notes', this.value)">${escHtml(f.notes)}</textarea>
      </div>
    </div>

    <!-- RETEX -->
    <div class="section">
      <div class="section-title">💡 Retour d'expérience
        <button onclick="toggleSection('retexBody', 'btnRetex')" id="btnRetex" style="margin-left:auto;background:none;
          border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;
          font-size:.7rem;cursor:pointer;transition:transform .2s;">▼</button>
      </div>
      <div id="retexBody">
        <textarea class="notes-area" placeholder="Ce qui a bien marché, astuces pour la prochaine fois..."
          oninput="updateField('retex', this.value)">${escHtml(f.retex)}</textarea>
      </div>
    </div>

    <div class="save-bar">
      <span class="save-msg" id="saveMsg">✓ Sauvegardé</span>
      <button class="btn-save" onclick="forceSave()">Sauvegarder</button>
    </div>
  `;

  // Restaure l'état des sections
  ['checklist', 'process', 'calculs', 'notes', 'retex'].forEach(key => {
    const open = f.sections[key] !== false;
    const body = document.getElementById(key + 'Body');
    const btnId = key === 'checklist' ? 'btnToggleChecklist'
                : key === 'process'   ? 'btnToggleProcess'
                : 'btn' + key.charAt(0).toUpperCase() + key.slice(1);
    const btn = document.getElementById(btnId);
    if (body) body.style.display = open ? 'block' : 'none';
    if (btn) btn.style.transform = open ? 'rotate(0deg)' : 'rotate(-90deg)';
  });
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getFiche() { return fiches.find(x => x.id === currentId); }
function updateField(key, value) {
  const f = getFiche(); if (!f) return;
  f[key] = value;
  save();
  if (key === 'type' || key === 'status') renderSidebar();
}

// ══════════════════════════════════════════════════
//  CHECKLIST
// ══════════════════════════════════════════════════
function toggleCheck(i, done) {
  const f = getFiche();
  f.checklist[i].done = done;
  save();
  
  // Met à jour le badge
  const badge = document.getElementById('checkBadge');
  if (badge) badge.textContent = `${f.checklist.filter(x=>x.done).length}/${f.checklist.length}`;
  
  // Affiche le bouton supprimer si au moins un est coché
  const hasChecked = f.checklist.some(x => x.done);
  document.getElementById('selectBar').style.display = hasChecked ? 'flex' : 'none';
  updateSelectCountCustom(f.checklist);
}
function addCheck() {
  const input = document.getElementById('newCheckInput');
  const text = input.value.trim();
  if (!text) return;
  const f = getFiche();
  f.checklist.push({ text, done: false });
  save(); input.value = '';
  renderChecklist(f); input.focus();
}
function removeCheck(i) {
  const f = getFiche();
  f.checklist.splice(i, 1);
  save(); renderChecklist(f);
}
function importTemplate() {
  const sel = document.getElementById('importTplSelect');
  const tIndex = sel.value;
  if (tIndex === '') return;
  const t = templates[tIndex];
  const f = getFiche();
  if (!t || !f) return;
  if (!f.usedTemplates) f.usedTemplates = [];
  const existants = f.checklist.map(item => item.text.trim().toLowerCase());
  t.items.forEach(it => {
    const cleanItem = it.trim();
    if (cleanItem && !existants.includes(cleanItem.toLowerCase()))
      f.checklist.push({ text: cleanItem, done: false });
  });
  if (!f.usedTemplates.includes(t.name)) f.usedTemplates.push(t.name);
  sel.value = ''; save(); openFiche(currentId);
}
function renderChecklist(f) {
  const container = document.getElementById('checklist');
  if (!container) return;
  container.innerHTML = f.checklist.map((item, i) => `
    <div class="check-item" id="ci-${i}">
      <input type="checkbox" id="chk-${i}" ${item.done ? 'checked' : ''}
        onchange="selectModeActive ? handleSelCheck(${i}, this) : toggleCheck(${i}, this.checked)">
      <label for="chk-${i}">${escHtml(item.text)}</label>
      <button class="btn-remove-item" onclick="removeCheck(${i})">×</button>
    </div>
  `).join('');
  const badge = document.getElementById('checkBadge');
  if (badge) badge.textContent = `${f.checklist.filter(x=>x.done).length}/${f.checklist.length}`;
}

// ══════════════════════════════════════════════════
//  CALCULS
// ══════════════════════════════════════════════════
function calcSurface(l, w) { const v = parseFloat(l) * parseFloat(w); return isNaN(v) ? '—' : v.toFixed(2); }
function calcVolume(s, h) { const v = parseFloat(s) * parseFloat(h); return isNaN(v) ? '—' : v.toFixed(3); }
function calcTonnage(vol, densite) { const v = parseFloat(vol) * parseFloat(densite); return isNaN(v) ? '—' : Math.round(v); }
function calcTonnes(vol, densite) { const v = parseFloat(vol) * parseFloat(densite) / 1000; return isNaN(v) ? '—' : v.toFixed(2); }
function updateCalcSurface() {
  const l = document.getElementById('calc-l').value;
  const w = document.getElementById('calc-w').value;
  const surface = calcSurface(l, w);
  document.getElementById('res-surface').textContent = surface;
  const f = getFiche(); f.calculs.surface = { l, w }; save();
  if (surface !== '—') { const s = document.getElementById('calc-s'); if (s) { s.value = surface; updateCalcVolume(); } }
}
function updateCalcVolume() {
  const s = document.getElementById('calc-s').value;
  const h = document.getElementById('calc-h').value;
  const volume = calcVolume(s, h);
  document.getElementById('res-volume').textContent = volume;
  const f = getFiche(); f.calculs.volume = { s, h }; save();
  if (volume !== '—') { const v = document.getElementById('calc-vol-t'); if (v) { v.value = volume; updateCalcTonnage(); } }
}
function updateCalcTonnage() {
  const vol = document.getElementById('calc-vol-t').value;
  const densite = document.getElementById('calc-densite').value;
  document.getElementById('res-tonnage').textContent = calcTonnage(vol, densite);
  document.getElementById('res-tonnes').textContent = calcTonnes(vol, densite);
  const f = getFiche(); f.calculs.densite = densite; save();
}
function updateCalcCustom(value) { const f = getFiche(); f.calculs.custom = value; save(); }

// ══════════════════════════════════════════════════
//  SAUVEGARDE FORCÉE
// ══════════════════════════════════════════════════
function forceSave() {
  clearTimeout(saveTimer);
  setSyncBar(true);
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    cache: 'no-cache',
    body: JSON.stringify({ action: 'save', data: { fiches, templates, processModels } })
  })
  .then(() => { setSyncBar(false); showSync('✓ Synchronisé', 'ok'); setTimeout(retourAListe, 500); })
  .catch(() => { setSyncBar(false); showSync('✗ Erreur', 'err'); });

  const msg = document.getElementById('saveMsg');
  if (msg) { msg.classList.add('visible'); setTimeout(() => msg.classList.remove('visible'), 2000); }
}

// ══════════════════════════════════════════════════
//  SUPPRESSION FICHE
// ══════════════════════════════════════════════════
function deleteFiche(id) {
  openConfirmModal('Supprimer cette fiche ?', 'Cette action est irréversible.', () => {
    // 1. On supprime la fiche des données locales
    fiches = fiches.filter(x => x.id !== id);
    currentId = null; 
    
    // 2. On sauvegarde et on actualise la barre latérale
    save(); 
    renderSidebar();
    
    // 3. LA CORRECTION : On force le retour à l'état initial
    retourAListe(); 

    // 4. On remet le message d'accueil par défaut dans le contenu principal
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">🗂</div>
        <h2>Aucune fiche ouverte</h2>
        <p>Créez une nouvelle fiche de client/chantier pour démarrer.</p>
      </div>`;
  });
}

// ══════════════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════════════
function openConfirmModal(title, msg, onConfirm) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').style.display = 'flex';
  document.getElementById('confirmOk').onclick = () => { closeConfirmModal(); onConfirm(); };
}
function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; }
function removeUsedTemplate(idx) {
  const f = getFiche(); f.usedTemplates.splice(idx, 1); save(); openFiche(currentId);
}

// ══════════════════════════════════════════════════
//  SÉLECTION CHECKLIST
// ══════════════════════════════════════════════════
let selectModeActive = false;
let selectedCheckItems = new Set();

function toggleSelectMode() {
  selectModeActive = !selectModeActive;
  selectedCheckItems.clear();
  const bar = document.getElementById('selectBar');
  const btn = document.getElementById('btnSelectMode');
  if (selectModeActive) {
    bar.style.display = 'flex';
    btn.style.color = 'var(--accent)'; btn.style.borderColor = 'var(--accent)'; btn.textContent = '✕ Annuler';
    const f = getFiche();
    f.checklist.forEach((_, i) => {
      selectedCheckItems.add(i);
      const chk = document.getElementById(`chk-${i}`);
      const ci = document.getElementById(`ci-${i}`);
      if (chk) { chk.checked = true; chk.style.accentColor = 'var(--red)'; }
      if (ci) ci.style.borderColor = 'var(--red)';
    });
    updateSelectCount();
  } else {
    bar.style.display = 'none';
    btn.style.color = 'var(--muted)'; btn.style.borderColor = 'var(--border)'; btn.textContent = '☐ Sélectionner';
    const f = getFiche();
    f.checklist.forEach((item, i) => {
      const chk = document.getElementById(`chk-${i}`);
      if (chk) { chk.checked = item.done; chk.style.accentColor = ''; }
      const ci = document.getElementById(`ci-${i}`);
      if (ci) ci.style.borderColor = '';
    });
    updateSelectCount();
  }
}
function handleSelCheck(i, checkbox) {
  if (selectedCheckItems.has(i)) {
    selectedCheckItems.delete(i); checkbox.checked = false;
    document.getElementById(`ci-${i}`).style.borderColor = ''; checkbox.style.accentColor = '';
  } else {
    selectedCheckItems.add(i); checkbox.checked = true;
    document.getElementById(`ci-${i}`).style.borderColor = 'var(--red)'; checkbox.style.accentColor = 'var(--red)';
  }
  updateSelectCount();
}
function selectAllItems() {
  const f = getFiche();
  f.checklist.forEach((_, i) => {
    selectedCheckItems.add(i);
    const chk = document.getElementById(`chk-${i}`); const ci = document.getElementById(`ci-${i}`);
    if (chk) { chk.checked = true; chk.style.accentColor = 'var(--red)'; }
    if (ci) ci.style.borderColor = 'var(--red)';
  });
  updateSelectCount();
}
function deselectAllItems() {
  selectedCheckItems.clear();
  const f = getFiche();
  f.checklist.forEach((_, i) => {
    const chk = document.getElementById(`chk-${i}`); const ci = document.getElementById(`ci-${i}`);
    if (chk) { chk.checked = false; chk.style.accentColor = ''; }
    if (ci) ci.style.borderColor = '';
  });
  updateSelectCount();
}
// Fonction utilitaire pour compter les éléments à supprimer
function updateSelectCountCustom(list) {
  const count = list.filter(x => x.done).length;
  const el = document.getElementById('selectCount');
  if (el) el.textContent = count > 0 ? `${count} prêt(s) à supprimer` : '';
}

function deleteSelectedItems() {
  if (!selectedCheckItems.size) return;
  openConfirmModal(
    `Supprimer ${selectedCheckItems.size} élément${selectedCheckItems.size > 1 ? 's' : ''} ?`,
    'Cette action est irréversible.',
    () => {
      const f = getFiche();
      f.checklist = f.checklist.filter((_, i) => !selectedCheckItems.has(i));
      selectedCheckItems.clear(); selectModeActive = false; save(); openFiche(currentId);
    }
  );
}

//  SÉLECTION PROCESS

    f.process.forEach((item, i) => {
      const chk = document.getElementById(`pchk-${i}`);

function selectAllProcess() {

function deselectAllProcess() {

  const f = getFiche();
  f.process.forEach((_, i) => {
    const chk = document.getElementById(`pchk-${i}`); const ci = document.getElementById(`pi-${i}`);
    if (chk) { chk.checked = false; chk.style.accentColor = ''; }
    if (ci) ci.style.borderColor = '';
  });
  updateProcessSelectCount();
}
function updateProcessSelectCount() {
  const el = document.getElementById('processSelectCount');
  if (el) el.textContent = selectedProcessItems.size > 0
    ? `${selectedProcessItems.size} sélectionné${selectedProcessItems.size > 1 ? 's' : ''}` : '';
}
function deleteSelectedProcess() {
  if (!selectedProcessItems.size) return;
  openConfirmModal(
    `Supprimer ${selectedProcessItems.size} élément${selectedProcessItems.size > 1 ? 's' : ''} ?`,
    'Cette action est irréversible.',

      const f = getFiche();

    }

}

// ══════════════════════════════════════════════════
//  TOGGLE SECTIONS
// ══════════════════════════════════════════════════
function toggleSection(bodyId, btnId) {
  const body = document.getElementById(bodyId);
  const btn = document.getElementById(btnId);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  btn.style.transform = open ? 'rotate(-90deg)' : 'rotate(0deg)';
  const f = getFiche(); if (!f) return;
  if (!f.sections) f.sections = {};
  const key = bodyId.replace('Body', '');
  f.sections[key] = !open;
  save();
}

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
function retourAListe() {
  // Enlève la classe qui cache la sidebar sur mobile
  document.body.classList.remove('show-detail'); 
  
  // Réinitialise l'ID de la fiche en cours
  currentId = null; 
  
  // Rafraîchit la liste pour être sûr qu'elle est à jour
  renderSidebar(); 
  
  // Remonte en haut de page pour le confort
  window.scrollTo(0, 0); 
  
  // Optionnel : Remet l'état vide dans le panneau central
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <div class="icon">🗂</div>
      <h2>Aucune fiche ouverte</h2>
      <p>Créez une nouvelle fiche de client/chantier pour démarrer.</p>
    </div>`;
}
